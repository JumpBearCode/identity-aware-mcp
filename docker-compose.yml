services:
  mcp-server:
    build: ./src/mcp-server
    container_name: mcp-server
    ports:
      - "8081:8080"   # host 8080 was taken locally; container still listens on 8080
    env_file: .env
    environment:
      EXECUTOR: ${EXECUTOR:-local}
      DIAGNOSE_WORKER_URL: http://diagnose-worker:9001
      ACTION_WORKER_URL: http://action-worker:9002
      MCP_EXEC_TIMEOUT: ${MCP_EXEC_TIMEOUT:-120}
      # Local Redis powers the Session sliding window + group cache.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - diagnose-worker
      - action-worker
      - redis

  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    ports:
      - "6379:6379"

  diagnose-worker:
    build: ./src/worker
    image: bash-worker:latest
    container_name: diagnose-worker
    environment:
      WORKER_NAME: diagnose-worker
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${DIAGNOSE_SP_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${DIAGNOSE_SP_CLIENT_SECRET}
      # Worker holds only data-plane RBAC; default all `az storage` calls to AAD
      # so commands work without needing --auth-mode login each time.
      AZURE_STORAGE_AUTH_MODE: login
      MAX_OUTPUT_BYTES: ${MAX_OUTPUT_BYTES:-65536}
      PORT: "9001"

  action-worker:
    build: ./src/worker
    image: bash-worker:latest
    container_name: action-worker
    environment:
      WORKER_NAME: action-worker
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${ACTION_SP_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${ACTION_SP_CLIENT_SECRET}
      # Worker holds only data-plane RBAC; default all `az storage` calls to AAD
      # so commands work without needing --auth-mode login each time.
      AZURE_STORAGE_AUTH_MODE: login
      MAX_OUTPUT_BYTES: ${MAX_OUTPUT_BYTES:-65536}
      PORT: "9002"
